<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Translator & History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
        
        :root { --primary: #2563eb; }
        html.dark { --primary: #3b82f6; }

        body {
            font-family: 'Sarabun', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        
        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        canvas { width: 100%; height: 60px; display: block; }
        
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: opacity 200ms, transform 200ms; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 h-screen flex flex-col text-slate-800 dark:text-slate-100 overflow-hidden">

    <!-- Header -->
    <header class="bg-blue-600 dark:bg-blue-800 text-white shadow-md z-10 shrink-0">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="sparkles" class="w-6 h-6 text-yellow-300"></i>
                <h1 class="text-xl font-bold hidden sm:block font-sans">AI Translator & History</h1>
                <h1 class="text-xl font-bold sm:hidden">แปลภาษาสด</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <span id="cloudStatus" class="flex items-center gap-1 text-xs font-medium text-blue-200">
                    <i data-lucide="cloud-off" class="w-4 h-4"></i> ออฟไลน์
                </span>
                <button id="themeToggle" class="p-2 hover:bg-white/20 rounded-full transition">
                    <i data-lucide="moon" id="themeIcon" class="w-5 h-5"></i>
                </button>
                <div class="h-6 w-px bg-white/30"></div>
                <button id="clearBtn" class="hidden px-3 py-1.5 rounded-lg text-sm font-medium bg-red-500 hover:bg-red-400 text-white transition shadow-sm">
                    ล้างประวัติ
                </button>
            </div>
        </div>
    </header>

    <!-- Visualizer Area -->
    <div id="visualizerContainer" class="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 h-16 hidden flex items-center px-4 shadow-inner">
        <canvas id="waveform"></canvas>
    </div>

    <!-- Main Content -->
    <main class="flex-1 overflow-hidden flex flex-col md:flex-row p-2 sm:p-4 gap-4 max-w-[1600px] w-full mx-auto relative">
        
        <div id="loadingOverlay" class="absolute inset-0 z-20 bg-gray-50/80 dark:bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center hidden">
            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-blue-600 dark:text-blue-400 font-medium">กำลังโหลดประวัติ...</p>
        </div>

        <!-- Left Side: Source -->
        <section class="flex-1 flex flex-col bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden">
            <div class="bg-gray-50 dark:bg-slate-900/50 p-3 border-b border-gray-200 dark:border-slate-700 flex items-center justify-between gap-2 shrink-0">
                <div class="flex items-center gap-2 flex-1">
                    <select id="sourceLangSelect" class="bg-transparent dark:text-white text-sm font-semibold outline-none border-b-2 border-transparent focus:border-blue-500 px-1 py-1 cursor-pointer">
                    </select>
                </div>
                <div id="recordingIndicator" class="hidden flex items-center gap-2 text-red-500 text-xs font-bold animate-pulse bg-red-50 dark:bg-red-900/20 px-2 py-1 rounded-md border border-red-100 dark:border-red-900/50">
                    <span class="w-2 h-2 rounded-full bg-red-500"></span> REC
                </div>
            </div>

            <div id="sourceContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 custom-scrollbar">
            </div>
        </section>

        <!-- Middle: Swap -->
        <div class="hidden md:flex flex-col justify-center shrink-0">
            <button id="swapBtn" class="p-3 bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-full hover:bg-blue-50 dark:hover:bg-slate-600 transition shadow-sm transform hover:scale-105 active:scale-95 text-slate-600 dark:text-slate-300">
                <i data-lucide="arrow-right-left" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Right Side: Translation -->
        <section class="flex-1 flex flex-col bg-blue-50/30 dark:bg-blue-900/10 rounded-xl shadow-sm border border-blue-100 dark:border-blue-900/30 overflow-hidden">
            <div class="bg-blue-50/80 dark:bg-slate-900/50 p-3 border-b border-blue-100 dark:border-slate-700 flex items-center justify-between gap-2 shrink-0">
                <select id="targetLangSelect" class="bg-transparent dark:text-white text-sm font-semibold outline-none border-b-2 border-transparent focus:border-blue-500 px-1 py-1 cursor-pointer">
                </select>
            </div>

            <div id="targetContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 custom-scrollbar">
            </div>
        </section>
    </main>

    <!-- Bottom Controls -->
    <footer class="p-4 sm:p-6 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 shadow-lg shrink-0 flex items-center justify-center relative">
        <button id="swapBtnMobile" class="md:hidden absolute left-4 sm:left-6 p-2.5 sm:p-3 bg-gray-100 dark:bg-slate-700 rounded-full text-gray-600 dark:text-slate-300 shadow-sm">
            <i data-lucide="arrow-right-left" class="w-5 h-5"></i>
        </button>

        <div class="flex flex-col items-center gap-2">
            <button id="micBtn" class="w-16 h-16 sm:w-20 sm:h-20 rounded-full text-white bg-blue-600 hover:bg-blue-700 shadow-xl transition-all transform active:scale-95 flex items-center justify-center group relative overflow-hidden">
                <div id="micHoverEffect" class="absolute inset-0 bg-white/20 scale-0 group-hover:scale-100 transition-transform rounded-full"></div>
                <i id="micIcon" data-lucide="mic" class="w-8 h-8 sm:w-10 sm:h-10 relative z-10"></i>
            </button>
            <span id="micStatusText" class="text-[10px] sm:text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">แตะเพื่อพูด</span>
        </div>

        <div class="absolute right-4 sm:right-6 flex flex-col items-end gap-2">
            <label class="inline-flex items-center cursor-pointer bg-gray-50 dark:bg-slate-900/50 px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg border border-gray-200 dark:border-slate-700 shadow-sm">
                <span class="mr-2 sm:mr-3 text-[10px] sm:text-xs font-medium text-gray-600 dark:text-gray-300">อ่านอัตโนมัติ</span>
                <input type="checkbox" id="autoSpeakToggle" class="sr-only peer">
                <div class="relative w-8 sm:w-9 h-4 sm:h-5 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-600 peer-checked:after:translate-x-full peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 sm:after:h-4 after:w-3 sm:after:w-4 after:transition-all"></div>
            </label>
        </div>
    </footer>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm hidden transition-opacity">
        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 transform transition-all modal-enter border border-gray-100 dark:border-slate-700">
            <div class="flex items-center gap-3 text-red-500 mb-4">
                <div class="p-2 bg-red-100 dark:bg-red-900/30 rounded-full">
                    <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">ยืนยันการล้างประวัติ</h3>
            </div>
            <p class="text-gray-600 dark:text-gray-300 text-sm mb-6">คุณแน่ใจหรือไม่ที่จะลบประวัติการแปลทั้งหมด? การกระทำนี้ไม่สามารถย้อนกลับได้</p>
            <div class="flex items-center justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 transition">ยกเลิก</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-red-500 hover:bg-red-600 transition shadow-sm">ลบข้อมูล</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'voice-translator-app';
        const apiKey = ""; // Managed by environment

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;
        let unsubscribeHistory = null;

        const languages = [
            { code: 'th-TH', translateCode: 'Thai', name: 'ไทย (Thai)' },
            { code: 'en-US', translateCode: 'English', name: 'อังกฤษ (English)' },
            { code: 'ja-JP', translateCode: 'Japanese', name: 'ญี่ปุ่น (Japanese)' },
            { code: 'ko-KR', translateCode: 'Korean', name: 'เกาหลี (Korean)' },
            { code: 'zh-CN', translateCode: 'Chinese Simplified', name: 'จีน (Chinese)' },
            { code: 'fr-FR', translateCode: 'French', name: 'ฝรั่งเศส (French)' },
        ];

        let isListening = false;
        let sentences = [];
        let sourceLang = languages[0];
        let targetLang = languages[1];
        let recognition = null;
        let isDarkMode = false;
        
        // Visualizer State
        let audioContext, analyser, dataArray, mediaStreamSource, animationId;

        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        const sourceContainer = document.getElementById('sourceContainer');
        const targetContainer = document.getElementById('targetContainer');
        const waveform = document.getElementById('waveform');
        const visualizerContainer = document.getElementById('visualizerContainer');
        const autoSpeakToggle = document.getElementById('autoSpeakToggle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const cloudStatus = document.getElementById('cloudStatus');
        const confirmModal = document.getElementById('confirmModal');

        async function init() {
            // Setup Selects
            const srcSelect = document.getElementById('sourceLangSelect');
            const tgtSelect = document.getElementById('targetLangSelect');
            languages.forEach(l => {
                srcSelect.add(new Option(l.name, l.code));
                tgtSelect.add(new Option(l.name, l.code));
            });
            srcSelect.value = sourceLang.code;
            tgtSelect.value = targetLang.code;

            // System Theme Check
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                toggleTheme(true);
            }

            // Listeners
            micBtn.addEventListener('click', toggleListening);
            document.getElementById('themeToggle').addEventListener('click', () => toggleTheme());
            document.getElementById('swapBtn').addEventListener('click', swapLanguages);
            document.getElementById('swapBtnMobile').addEventListener('click', swapLanguages);
            document.getElementById('clearBtn').addEventListener('click', () => {
                confirmModal.classList.remove('hidden');
                setTimeout(() => confirmModal.firstElementChild.classList.add('modal-enter-active'), 10);
            });
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmClearHistory);
            
            srcSelect.onchange = (e) => {
                sourceLang = languages.find(l => l.code === e.target.value);
                if (isListening) restartRecognition();
            };
            tgtSelect.onchange = (e) => {
                targetLang = languages.find(l => l.code === e.target.value);
            };

            lucide.createIcons();

            // Firebase Auth
            loadingOverlay.classList.remove('hidden');
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth init failed:", err);
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    cloudStatus.innerHTML = `<i data-lucide="cloud-check" class="w-4 h-4 text-green-400"></i> ออนไลน์`;
                    lucide.createIcons();
                    loadHistory();
                } else {
                    currentUser = null;
                    cloudStatus.innerHTML = `<i data-lucide="cloud-off" class="w-4 h-4 text-red-400"></i> ออฟไลน์`;
                    lucide.createIcons();
                    if (unsubscribeHistory) unsubscribeHistory();
                    loadingOverlay.classList.add('hidden');
                }
            });
        }

        function loadHistory() {
            if (!currentUser) return;
            // RULE 1: Strict Paths
            const historyRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'history');
            
            unsubscribeHistory = onSnapshot(historyRef, (snapshot) => {
                const loaded = [];
                snapshot.forEach(doc => loaded.push({ id: doc.id, ...doc.data() }));
                // RULE 2: No complex queries, sort in memory
                loaded.sort((a, b) => a.timestamp - b.timestamp);
                sentences = loaded;
                renderUI();
                loadingOverlay.classList.add('hidden');
            }, (error) => {
                console.error("Firestore Error:", error);
                loadingOverlay.classList.add('hidden');
            });
        }

        async function saveTranslation(id, text, translationText) {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'history', id);
                await setDoc(docRef, {
                    source: text,
                    translation: translationText,
                    sourceLang: sourceLang.code,
                    targetLang: targetLang.code,
                    timestamp: Date.now()
                });
            } catch (err) { console.error("Save failed:", err); }
        }

        async function confirmClearHistory() {
            if (!currentUser) return;
            const historyRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'history');
            try {
                // Delete all sequentially (avoiding complex batching for simplicity)
                for (const s of sentences) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'history', s.id));
                }
            } catch (err) { console.error("Clear failed:", err); }
            closeModal();
        }

        window.closeModal = function() {
            confirmModal.firstElementChild.classList.remove('modal-enter-active');
            setTimeout(() => confirmModal.classList.add('hidden'), 200);
        };

        async function callGemini(text, from, to) {
            const systemPrompt = `Translate the given text from ${from} to ${to}. Return ONLY translated text. Keep natural tone.`;
            const payload = {
                contents: [{ parts: [{ text: `Translate this: "${text}"` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            let retries = 5;
            let delay = 1000;
            while (retries > 0) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "Error translating";
                } catch (e) {
                    retries--;
                    if (retries === 0) return "ขออภัย ระบบแปลภาษาขัดข้องชั่วคราว";
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function toggleListening() {
            if (isListening) stopListening();
            else startListening();
        }

        function startListening() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) {
                alert("Browser does not support Speech Recognition");
                return;
            }

            if (recognition) {
                recognition.onend = null;
                recognition.stop();
            }

            recognition = new SpeechRec();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = sourceLang.code;

            recognition.onstart = () => {
                isListening = true;
                updateMicUI();
                startVisualizer();
            };

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const text = event.results[i][0].transcript.trim();
                    if (event.results[i].isFinal) {
                        if (text) handleFinalText(text);
                    } else {
                        interim += text;
                    }
                }
                updateInterimUI(interim);
            };

            recognition.onerror = (e) => {
                if (e.error !== 'no-speech') console.error("Speech Error:", e.error);
                if (e.error === 'not-allowed') stopListening();
            };

            recognition.onend = () => {
                if (isListening) {
                    try { recognition.start(); } catch(e) {}
                }
            };
            
            try { recognition.start(); } catch(e) { console.error("Start error", e); }
        }

        function stopListening() {
            isListening = false;
            if (recognition) {
                recognition.onend = null;
                recognition.stop();
            }
            stopVisualizer();
            updateMicUI();
            updateInterimUI('');
        }

        async function handleFinalText(text) {
            const id = Date.now().toString();
            // Save initial processing state
            await saveTranslation(id, text, 'กำลังแปล...');
            
            const result = await callGemini(text, sourceLang.translateCode, targetLang.translateCode);
            await saveTranslation(id, text, result);

            if (autoSpeakToggle.checked) speakText(result);
        }

        function renderUI() {
            const hasData = sentences.length > 0;
            document.getElementById('clearBtn').classList.toggle('hidden', !hasData);

            if (!hasData) {
                sourceContainer.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-400 text-center gap-2"><i data-lucide="mic" class="w-8 h-8 opacity-40"></i><p>แตะไมโครโฟนเพื่อพูด</p></div>';
                targetContainer.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-400 text-center gap-2"><i data-lucide="languages" class="w-8 h-8 opacity-40"></i><p>ผลการแปลจะแสดงที่นี่</p></div>';
                lucide.createIcons();
                return;
            }

            sourceContainer.innerHTML = '';
            targetContainer.innerHTML = '';

            sentences.forEach(s => {
                const isTranslating = s.translation === 'กำลังแปล...';

                // Source Item
                const sEl = document.createElement('div');
                sEl.className = 'bg-white dark:bg-slate-700 p-3 rounded-xl border border-gray-100 dark:border-slate-600 shadow-sm animate-in fade-in slide-in-from-bottom-2';
                sEl.innerHTML = `<p class="text-gray-800 dark:text-slate-100 text-sm sm:text-base">${s.source}</p>
                    <span class="text-[10px] text-gray-400 mt-1 block">${new Date(s.timestamp).toLocaleTimeString('th-TH')}</span>`;
                sourceContainer.appendChild(sEl);

                // Target Item
                const tEl = document.createElement('div');
                tEl.className = 'bg-blue-50/50 dark:bg-blue-900/20 p-3 rounded-xl border border-blue-100 dark:border-blue-900/40 shadow-sm flex flex-col gap-1';
                
                if (isTranslating) {
                    tEl.innerHTML = `<div class="flex items-center gap-2 text-blue-500"><div class="w-3 h-3 border-2 border-current border-t-transparent rounded-full animate-spin"></div><p class="text-sm italic">${s.translation}</p></div>`;
                } else {
                    tEl.innerHTML = `
                        <div class="flex justify-between items-start gap-2">
                            <p class="text-blue-900 dark:text-blue-100 font-medium text-sm sm:text-base flex-1">${s.translation}</p>
                            <button onclick="window.speakText('${s.translation.replace(/'/g, "\\'")}')" class="text-blue-500 hover:text-blue-700 p-1">
                                <i data-lucide="volume-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    `;
                }
                targetContainer.appendChild(tEl);
            });

            lucide.createIcons();
            
            // Auto scroll
            setTimeout(() => {
                sourceContainer.scrollTop = sourceContainer.scrollHeight;
                targetContainer.scrollTop = targetContainer.scrollHeight;
            }, 100);
        }

        function updateInterimUI(text) {
            const old = document.getElementById('interim-src');
            if (old) old.remove();
            if (!text) return;

            const div = document.createElement('div');
            div.id = 'interim-src';
            div.className = 'bg-gray-50 dark:bg-slate-800/50 p-3 rounded-xl border border-dashed border-gray-300 dark:border-slate-600 opacity-60 italic text-sm';
            div.innerText = `${text}...`;
            sourceContainer.appendChild(div);
            sourceContainer.scrollTop = sourceContainer.scrollHeight;
        }

        function updateMicUI() {
            if (isListening) {
                micBtn.classList.replace('bg-blue-600', 'bg-red-500');
                micBtn.classList.add('pulse-red');
                micIcon.setAttribute('data-lucide', 'square');
                document.getElementById('recordingIndicator').classList.remove('hidden');
                document.getElementById('micStatusText').innerText = "กำลังรับเสียง...";
                visualizerContainer.classList.remove('hidden');
            } else {
                micBtn.classList.replace('bg-red-500', 'bg-blue-600');
                micBtn.classList.remove('pulse-red');
                micIcon.setAttribute('data-lucide', 'mic');
                document.getElementById('recordingIndicator').classList.add('hidden');
                document.getElementById('micStatusText').innerText = "แตะเพื่อพูด";
                visualizerContainer.classList.add('hidden');
            }
            lucide.createIcons();
        }

        function startVisualizer() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (audioContext.state === 'suspended') audioContext.resume();

            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaStreamSource = audioContext.createMediaStreamSource(stream);
                mediaStreamSource.connect(analyser);
                drawWave();
            }).catch(e => console.warn("Vis mic access error", e));
        }

        function stopVisualizer() {
            if (animationId) cancelAnimationFrame(animationId);
            if (mediaStreamSource) mediaStreamSource.disconnect();
        }

        function drawWave() {
            animationId = requestAnimationFrame(drawWave);
            analyser.getByteFrequencyData(dataArray);
            const ctx = waveform.getContext('2d');
            const w = waveform.width = waveform.offsetWidth;
            const h = waveform.height = waveform.offsetHeight;
            ctx.clearRect(0, 0, w, h);
            
            const barWidth = (w / dataArray.length);
            let x = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const barHeight = (dataArray[i] / 255) * h;
                ctx.fillStyle = isDarkMode ? '#60a5fa' : '#2563eb';
                ctx.fillRect(x, h - barHeight, barWidth - 2, barHeight);
                x += barWidth;
            }
        }

        function toggleTheme(forceDark = null) {
            isDarkMode = forceDark !== null ? forceDark : !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            document.getElementById('themeIcon').setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function swapLanguages() {
            const temp = sourceLang;
            sourceLang = targetLang;
            targetLang = temp;
            document.getElementById('sourceLangSelect').value = sourceLang.code;
            document.getElementById('targetLangSelect').value = targetLang.code;
            if (isListening) restartRecognition();
        }

        function restartRecognition() {
            if (recognition) {
                recognition.stop();
                setTimeout(() => { if (isListening) startListening(); }, 300);
            }
        }

        window.speakText = function(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = targetLang.code;
            window.speechSynthesis.speak(ut);
        };

        window.onload = init;
    </script>
</body>
</html>
