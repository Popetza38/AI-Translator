<!DOCTYPE html>
<html lang="th" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator Ultimate</title>
    <meta name="description" content="AI Translator Ultimate - แปลภาษาอัจฉริยะด้วย Gemini AI พร้อม TTS, OCR, Dark Mode">

    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
            transition: background-color .3s, color .3s, border-color .3s
        }

        .glass {
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, .6)
        }

        .dark .glass {
            background: rgba(30, 30, 40, .88);
            border: 1px solid rgba(255, 255, 255, .08)
        }

        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin .8s linear infinite;
            display: inline-block
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes pulse-mic {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, .4)
            }

            50% {
                transform: scale(1.08);
                box-shadow: 0 0 0 12px rgba(239, 68, 68, 0)
            }
        }

        .mic-active {
            animation: pulse-mic 1.5s infinite;
            background: #fef2f2 !important;
            color: #ef4444 !important
        }

        .chip {
            transition: all .2s;
            cursor: pointer
        }

        .chip:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
            background: #eff6ff
        }

        .dark .chip:hover {
            background: #1e3a5f;
            border-color: #60a5fa
        }

        .voice-toggle input:checked+label {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            box-shadow: 0 2px 8px rgba(37, 99, 235, .3)
        }

        @keyframes typing {
            from {
                opacity: .2
            }

            to {
                opacity: 1
            }
        }

        .typing-dot {
            animation: typing 1s infinite alternate
        }

        .typing-dot:nth-child(2) {
            animation-delay: .3s
        }

        .typing-dot:nth-child(3) {
            animation-delay: .6s
        }

        .fav-btn.active i {
            color: #f59e0b
        }

        .modal-overlay {
            backdrop-filter: blur(4px)
        }

        textarea::-webkit-scrollbar,
        div::-webkit-scrollbar {
            width: 6px
        }

        textarea::-webkit-scrollbar-thumb,
        div::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px
        }

        .dark textarea::-webkit-scrollbar-thumb,
        .dark div::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-slate-100 to-blue-50 dark:from-gray-900 dark:to-gray-950 min-h-screen p-3 md:p-8 transition-colors">

    <!-- Settings Modal -->

                    <option value="th" selected>🇹🇭 ไทย</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="ja">🇯🇵 日本語</option>
                    <option value="zh">🇨🇳 中文</option>
                    <option value="ko">🇰🇷 한국어</option>
                    <option value="fr">🇫🇷 Français</option>
                    <option value="es">🇪🇸 Español</option>
                    <option value="de">🇩🇪 Deutsch</option>
                    <option value="pt">🇧🇷 Português</option>

                </div>

                <!-- Grammar Note -->

                    class="hidden mt-2 p-3 rounded-xl bg-green-50 dark:bg-green-950/30 border border-green-200 dark:border-green-800/40 text-green-800 dark:text-green-300 text-sm">
                    <i class="fa-solid fa-book mr-2 text-green-500"></i><span id="grammarText"></span>
                </div>

                        class="fav-btn bg-white/80 dark:bg-gray-700 text-slate-400 w-8 h-8 rounded-full shadow-sm flex items-center justify-center border border-blue-100 dark:border-gray-600"

                    <button id="copyTargetBtn"
                        class="bg-white/80 dark:bg-gray-700 text-blue-600 dark:text-blue-400 w-8 h-8 rounded-full shadow-sm flex items-center justify-center border border-blue-100 dark:border-gray-600"
                        title="คัดลอก"><i class="fa-solid fa-copy text-xs"></i></button>

                        class="bg-white/80 dark:bg-gray-700 text-blue-600 dark:text-blue-400 w-8 h-8 rounded-full shadow-sm flex items-center justify-center border border-blue-100 dark:border-gray-600"
                        title="ฟังเสียง"><i class="fa-solid fa-volume-high text-xs"></i></button>
                </div>
            </div>

            <!-- Suggestions -->

                    class="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest flex items-center gap-2 mb-3">

        <!-- Sidebar -->
        <div class="lg:col-span-1 flex flex-col gap-6">

            <div class="glass rounded-3xl shadow-xl p-5 h-fit">

                        class="flex-1 text-xs font-bold py-2 rounded-xl bg-blue-600 text-white transition-all"><i
                            class="fa-solid fa-clock-rotate-left mr-1"></i>ประวัติ</button>
                    <button onclick="showTab('favs')" id="tabFavs"
                        class="flex-1 text-xs font-bold py-2 rounded-xl bg-slate-200 dark:bg-gray-700 text-slate-600 dark:text-slate-300 transition-all"><i

    <script>
        // --- State ---
        let apiKey = localStorage.getItem('gemini_api_key') || '';
        let isTranslating = false, isSpeaking = false, isRecording = false;
        let history = JSON.parse(localStorage.getItem('trans_history') || '[]');
        let favorites = JSON.parse(localStorage.getItem('trans_favs') || '[]');
        let currentImageData = null;
        const el = k => document.getElementById(k);
        const $ = { sourceText: el('sourceText'), resultText: el('resultText'), sourceLang: el('sourceLang'), targetLang: el('targetLang'), translateBtn: el('translateBtn'), speakBtn: el('speakBtn'), speakSourceBtn: el('speakSourceBtn'), copySourceBtn: el('copySourceBtn'), copyTargetBtn: el('copyTargetBtn'), swapBtn: el('swapBtn'), audioControls: el('audioControls'), statusMessage: el('statusMessage'), suggestionsWrapper: el('suggestionsWrapper'), suggestionsList: el('suggestionsList'), historyList: el('historyList'), emptyHistory: el('emptyHistory'), clearHistoryBtn: el('clearHistoryBtn'), exportHistoryBtn: el('exportHistoryBtn'), micBtn: el('micBtn'), imgUploadBtn: el('imgUploadBtn'), imageInput: el('imageInput'), imagePreview: el('imagePreview'), imagePreviewContainer: el('imagePreviewContainer'), removeImageBtn: el('removeImageBtn'), charCount: el('charCount'), favBtn: el('favBtn'), romanBox: el('romanBox'), romanText: el('romanText'), grammarBox: el('grammarBox'), grammarText: el('grammarText') };

        // --- Dark Mode ---
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); const d = document.documentElement.classList.contains('dark'); localStorage.setItem('darkMode', d); el('themeIcon').className = d ? 'fa-solid fa-sun text-yellow-400' : 'fa-solid fa-moon text-slate-600' }
        if (localStorage.getItem('darkMode') === 'true') { document.documentElement.classList.add('dark'); el('themeIcon').className = 'fa-solid fa-sun text-yellow-400' }

        // --- Settings ---
        function toggleSettings() { const m = el('settingsModal'); m.classList.toggle('hidden'); m.classList.toggle('flex'); el('apiKeyInput').value = apiKey }
        function saveApiKey() { apiKey = el('apiKeyInput').value.trim(); localStorage.setItem('gemini_api_key', apiKey); toggleSettings(); showStatus('บันทึก API Key แล้ว ✓') }
        function toggleShortcuts() { const m = el('shortcutsModal'); m.classList.toggle('hidden'); m.classList.toggle('flex') }

        // --- Tabs ---
        function showTab(t) { el('historyPanel').classList.toggle('hidden', t !== 'history'); el('favsPanel').classList.toggle('hidden', t !== 'favs'); el('tabHistory').className = 'flex-1 text-xs font-bold py-2 rounded-xl transition-all ' + (t === 'history' ? 'bg-blue-600 text-white' : 'bg-slate-200 dark:bg-gray-700 text-slate-600 dark:text-slate-300'); el('tabFavs').className = 'flex-1 text-xs font-bold py-2 rounded-xl transition-all ' + (t === 'favs' ? 'bg-blue-600 text-white' : 'bg-slate-200 dark:bg-gray-700 text-slate-600 dark:text-slate-300') }

        // --- Char Count ---
        $.sourceText.oninput = () => { const v = $.sourceText.value; const w = v.trim() ? v.trim().split(/\s+/).length : 0; $.charCount.textContent = `${v.length} ตัวอักษร | ${w} คำ` };

        // --- Speech Recognition ---
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition; let recognition = null;
        if (SR) {
            recognition = new SR(); recognition.continuous = false; recognition.interimResults = true;
            recognition.onresult = e => { $.sourceText.value = Array.from(e.results).map(r => r[0].transcript).join(''); $.sourceText.dispatchEvent(new Event('input')) };
            recognition.onend = () => { isRecording = false; $.micBtn.classList.remove('mic-active'); showStatus('บันทึกเสียงเสร็จสิ้น') };
            recognition.onerror = () => { isRecording = false; $.micBtn.classList.remove('mic-active') }
        }
        $.micBtn.onclick = () => { if (!recognition) return alert('เบราว์เซอร์ไม่รองรับ'); if (isRecording) { recognition.stop() } else { isRecording = true; $.micBtn.classList.add('mic-active'); showStatus('🎙️ กำลังฟัง...'); const langMap = { th: 'th-TH', en: 'en-US', ja: 'ja-JP', zh: 'zh-CN', ko: 'ko-KR', fr: 'fr-FR', es: 'es-ES', de: 'de-DE', pt: 'pt-BR', ru: 'ru-RU', it: 'it-IT', id: 'id-ID', vi: 'vi-VN', ar: 'ar-SA', hi: 'hi-IN' }; recognition.lang = langMap[$.sourceLang.value] || 'en-US'; recognition.start() } };

        // --- Image ---
        $.imgUploadBtn.onclick = () => $.imageInput.click();
        $.imageInput.onchange = e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => { currentImageData = ev.target.result.split(',')[1]; $.imagePreview.src = ev.target.result; $.imagePreviewContainer.classList.remove('hidden'); showStatus('📷 โหลดรูปภาพแล้ว') }; r.readAsDataURL(f) } };
        $.removeImageBtn.onclick = () => { currentImageData = null; $.imageInput.value = ''; $.imagePreviewContainer.classList.add('hidden') };

        // --- API ---
        async function fetchAPI(url, body, retries = 3) { for (let i = 0; i < retries; i++) { try { const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }); if (r.ok) return await r.json(); if (r.status !== 429 && r.status < 500) throw new Error(`HTTP ${r.status}`) } catch (e) { if (i === retries - 1) throw e } await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000)) } }

        // --- Translate ---
        async function translate() {
            const text = $.sourceText.value.trim(); if (!text && !currentImageData) return; if (isTranslating) return; if (!apiKey) return toggleSettings();
            isTranslating = true; $.translateBtn.disabled = true; $.translateBtn.innerHTML = '<div class="loader mr-2"></div>กำลังประมวลผล...'; $.statusMessage.textContent = ''; $.audioControls.classList.add('hidden'); $.suggestionsWrapper.classList.add('hidden'); $.romanBox.classList.add('hidden'); $.grammarBox.classList.add('hidden');
            const fromSel = $.sourceLang, toSel = $.targetLang; const fromName = fromSel.value === 'auto' ? 'the detected language' : fromSel.options[fromSel.selectedIndex].text; const toName = toSel.options[toSel.selectedIndex].text; const toLang = toSel.value;
            const parts = [];
            if (currentImageData) { parts.push({ inlineData: { mimeType: 'image/png', data: currentImageData } }); parts.push({ text: `Extract all text from this image and translate it to ${toName}. Return ONLY the translated text.` }) }
            if (text) { parts.push({ text: `Translate from ${fromName} to ${toName}. Return ONLY the translated text:\n"${text}"` }) }
            try {
                const res = await fetchAPI(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, { contents: [{ parts }] });
                const translated = res.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                if (translated) {
                    $.resultText.textContent = translated; $.resultText.classList.remove('text-slate-400', 'italic'); $.audioControls.classList.remove('hidden'); addHistory(text || '[แปลจากภาพ]', translated, fromSel.value, toSel.value); genSuggestions(translated, fromName, toName);
                    if (['ja', 'zh', 'ko', 'ar', 'hi', 'ru'].includes(toLang)) genRomanization(translated, toName);
                    genGrammar(text, translated, fromName, toName)
                }
            } catch (e) { $.statusMessage.innerHTML = `<span class="text-red-500">❌ ${e.message}</span>` }
            finally { isTranslating = false; $.translateBtn.disabled = false; $.translateBtn.innerHTML = '<i class="fa-solid fa-bolt"></i><span>ประมวลผลและแปล</span>' }
        }

        // --- Romanization ---
        async function genRomanization(text, lang) { try { const r = await fetchAPI(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, { contents: [{ parts: [{ text: `Provide romanization/transliteration for this ${lang} text. Return ONLY the romanized text (e.g. Pinyin for Chinese, Romaji for Japanese, Romanization for Korean/Arabic/Hindi/Russian): "${text}"` }] }] }); const t = r.candidates?.[0]?.content?.parts?.[0]?.text?.trim(); if (t) { $.romanText.textContent = t; $.romanBox.classList.remove('hidden') } } catch (e) { } }

        // --- Grammar ---
        async function genGrammar(src, translated, fromLang, toLang) { try { const r = await fetchAPI(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, { contents: [{ parts: [{ text: `Briefly explain (1-2 sentences) any important grammar or cultural nuance in this translation from ${fromLang} to ${toLang}. Source: "${src}" Translation: "${translated}". If nothing notable, reply "ไม่มีหมายเหตุ".` }] }] }); const t = r.candidates?.[0]?.content?.parts?.[0]?.text?.trim(); if (t && !t.includes('ไม่มีหมายเหตุ')) { $.grammarText.textContent = t; $.grammarBox.classList.remove('hidden') } } catch (e) { } }

        // --- Suggestions ---
        async function genSuggestions(text, fromLang, toLang) {
            try {
                const r = await fetchAPI(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, { contents: [{ parts: [{ text: `Given the translated text: "${text}"\n\nSuggest 6 short natural responses in ${toLang}. Include meanings in ${fromLang}.\n\nRespond ONLY with valid JSON in this exact format:\n{"suggestions":[{"reply":"response text","meaning":"meaning text"}]}` }] }] });
                const raw = r.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                if (!raw) return;
                // Try to extract JSON from the response
                let data;
                try {
                    data = JSON.parse(raw);
                } catch {
                    const match = raw.match(/\{[\s\S]*\}/);
                    if (match) data = JSON.parse(match[0]);
                    else return;
                }
                if (!data.suggestions || !data.suggestions.length) return;
                $.suggestionsList.innerHTML = '';
                data.suggestions.forEach(s => { const d = document.createElement('div'); d.className = 'chip bg-white dark:bg-gray-800 p-3 rounded-xl border border-slate-100 dark:border-gray-700 shadow-sm text-left cursor-pointer hover:border-blue-300 dark:hover:border-blue-600 transition-all'; d.innerHTML = `<div class="text-blue-600 dark:text-blue-400 font-bold text-xs">${s.reply}</div><div class="text-slate-400 dark:text-slate-500 text-[9px]">${s.meaning}</div>`; d.onclick = () => { $.sourceText.value = s.reply; $.sourceText.dispatchEvent(new Event('input')); const t = $.sourceLang.value; $.sourceLang.value = $.targetLang.value; $.targetLang.value = t; translate() }; $.suggestionsList.appendChild(d) });
                $.suggestionsWrapper.classList.remove('hidden')
            } catch (e) { console.error('Smart Replies error:', e) }
        }

        // --- History ---
        function addHistory(src, tgt, from, to) { history.unshift({ source: src, target: tgt, from, to, id: Date.now() }); if (history.length > 20) history.pop(); localStorage.setItem('trans_history', JSON.stringify(history)); renderHistory() }
        function renderHistory() {
            const empty = history.length === 0; el('emptyHistory') && (el('emptyHistory').classList.toggle('hidden', !empty)); $.clearHistoryBtn.classList.toggle('hidden', empty); $.exportHistoryBtn.classList.toggle('hidden', empty);
            $.historyList.innerHTML = empty ? '<p id="emptyHistory" class="text-slate-400 dark:text-slate-500 text-sm italic text-center py-4">ยังไม่มีประวัติ</p>' : '';
            history.forEach(i => {
                const d = document.createElement('div'); d.className = 'bg-white dark:bg-gray-800 p-3 rounded-xl border border-slate-100 dark:border-gray-700 shadow-sm cursor-pointer hover:border-blue-300 dark:hover:border-blue-600 transition-all'; d.innerHTML = `<div class="text-[9px] text-slate-400 font-bold">${i.from}→${i.to}</div><div class="text-xs text-slate-600 dark:text-slate-300 line-clamp-1">${i.source}</div><div class="text-xs text-blue-600 dark:text-blue-400 font-medium line-clamp-1">${i.target}</div>`;
                d.onclick = () => { $.sourceText.value = i.source === '[แปลจากภาพ]' ? '' : i.source; $.sourceText.dispatchEvent(new Event('input')); $.sourceLang.value = i.from; $.targetLang.value = i.to; $.resultText.textContent = i.target; $.resultText.classList.remove('text-slate-400', 'italic'); $.audioControls.classList.remove('hidden') }; $.historyList.appendChild(d)
            })
        }
        $.clearHistoryBtn.onclick = () => { history = []; localStorage.removeItem('trans_history'); renderHistory() };
        $.exportHistoryBtn.onclick = () => { const b = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'translator_history.json'; a.click() };
        renderHistory();

        // --- Favorites ---
        $.favBtn.onclick = () => {
            const src = $.sourceText.value.trim(), tgt = $.resultText.textContent.trim(); if (!tgt || tgt.includes('ผลลัพธ์จะแสดง')) return;
            const exists = favorites.findIndex(f => f.target === tgt);
            if (exists >= 0) { favorites.splice(exists, 1); $.favBtn.classList.remove('active'); showStatus('ลบบุ๊คมาร์คแล้ว') }
            else { favorites.unshift({ source: src || '[แปลจากภาพ]', target: tgt, from: $.sourceLang.value, to: $.targetLang.value, id: Date.now() }); $.favBtn.classList.add('active'); showStatus('⭐ เพิ่มบุ๊คมาร์คแล้ว') }
            localStorage.setItem('trans_favs', JSON.stringify(favorites)); renderFavs()
        };
        function renderFavs() {
            const empty = favorites.length === 0; el('emptyFavs').classList.toggle('hidden', !empty); el('clearFavsBtn').classList.toggle('hidden', empty);
            el('favsList').innerHTML = empty ? '<p id="emptyFavs" class="text-slate-400 dark:text-slate-500 text-sm italic text-center py-4">ยังไม่มีบุ๊คมาร์ค</p>' : '';
            favorites.forEach((i, idx) => {
                const d = document.createElement('div'); d.className = 'bg-white dark:bg-gray-800 p-3 rounded-xl border border-amber-100 dark:border-amber-800/40 shadow-sm cursor-pointer hover:border-amber-300 transition-all relative'; d.innerHTML = `<div class="text-[9px] text-slate-400 font-bold">${i.from}→${i.to}</div><div class="text-xs text-slate-600 dark:text-slate-300 line-clamp-1">${i.source}</div><div class="text-xs text-amber-600 dark:text-amber-400 font-medium line-clamp-1">${i.target}</div><button class="absolute top-2 right-2 text-red-400 hover:text-red-600 text-xs" data-idx="${idx}"><i class="fa-solid fa-xmark"></i></button>`;
                d.querySelector('button').onclick = e => { e.stopPropagation(); favorites.splice(idx, 1); localStorage.setItem('trans_favs', JSON.stringify(favorites)); renderFavs() };
                d.onclick = () => { $.sourceText.value = i.source === '[แปลจากภาพ]' ? '' : i.source; $.sourceText.dispatchEvent(new Event('input')); $.sourceLang.value = i.from; $.targetLang.value = i.to; $.resultText.textContent = i.target; $.audioControls.classList.remove('hidden') }; el('favsList').appendChild(d)
            })
        }
        el('clearFavsBtn').onclick = () => { favorites = []; localStorage.removeItem('trans_favs'); renderFavs() }; renderFavs();

        // --- TTS ---
        function pcmToWav(p, sr) { const b = new ArrayBuffer(44 + p.length), v = new DataView(b), w = (o, s) => { for (let i = 0; i < s.length; i++)v.setUint8(o + i, s.charCodeAt(i)) }; w(0, 'RIFF'); v.setUint32(4, 36 + p.length, !0); w(8, 'WAVE'); w(12, 'fmt '); v.setUint32(16, 16, !0); v.setUint16(20, 1, !0); v.setUint16(22, 1, !0); v.setUint32(24, sr, !0); v.setUint32(28, sr * 2, !0); v.setUint16(32, 2, !0); v.setUint16(34, 16, !0); w(36, 'data'); v.setUint32(40, p.length, !0); for (let i = 0; i < p.length; i++)v.setUint8(44 + i, p[i]); return new Blob([b], { type: 'audio/wav' }) }
        async function speakText(text, btn) {
            if (!text || isSpeaking) return; if (!apiKey) return toggleSettings(); isSpeaking = true; const voice = document.querySelector('input[name="voiceGender"]:checked').value; const orig = btn.innerHTML; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            try {
                const r = await fetchAPI(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, { model: 'gemini-2.5-flash-preview-tts', contents: [{ parts: [{ text }] }], generationConfig: { responseModalities: ['AUDIO'], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } } } });
                const ad = r.candidates?.[0]?.content?.parts?.[0]?.inlineData; if (ad) { const sr = parseInt(ad.mimeType.split('rate=')[1]) || 24000; const wav = pcmToWav(Uint8Array.from(atob(ad.data), c => c.charCodeAt(0)), sr); const a = new Audio(URL.createObjectURL(wav)); a.onended = () => { isSpeaking = false; btn.innerHTML = orig }; await a.play() }
            } catch (e) { isSpeaking = false; btn.innerHTML = orig }
        }

        // --- Events ---
        $.translateBtn.onclick = translate;
        $.speakSourceBtn.onclick = () => speakText($.sourceText.value, $.speakSourceBtn);
        $.speakBtn.onclick = () => speakText($.resultText.textContent, $.speakBtn);
        $.swapBtn.onclick = () => { if ($.sourceLang.value === 'auto') return; const tL = $.sourceLang.value; $.sourceLang.value = $.targetLang.value; $.targetLang.value = tL; const r = $.resultText.textContent; if (r && !r.includes('ผลลัพธ์จะแสดง')) { $.sourceText.value = r; $.sourceText.dispatchEvent(new Event('input')); translate() } };
        $.copySourceBtn.onclick = () => { navigator.clipboard.writeText($.sourceText.value); showStatus('📋 คัดลอกแล้ว!') };
        $.copyTargetBtn.onclick = () => { navigator.clipboard.writeText($.resultText.textContent); showStatus('📋 คัดลอกแล้ว!') };
        function showStatus(msg) { $.statusMessage.textContent = msg; setTimeout(() => $.statusMessage.textContent = '', 2500) }

        // --- Keyboard Shortcuts ---
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); translate() }
            if (e.ctrlKey && e.shiftKey && e.key === 'S') { e.preventDefault(); $.swapBtn.click() }
            if (e.ctrlKey && e.shiftKey && e.key === 'X') { e.preventDefault(); $.sourceText.value = ''; $.sourceText.dispatchEvent(new Event('input')); $.resultText.innerHTML = '<span class="text-slate-400 dark:text-slate-500 italic font-light">ผลลัพธ์จะแสดงตรงนี้...</span>'; $.audioControls.classList.add('hidden'); $.romanBox.classList.add('hidden'); $.grammarBox.classList.add('hidden'); $.suggestionsWrapper.classList.add('hidden') }
            if (e.ctrlKey && e.shiftKey && e.key === 'D') { e.preventDefault(); toggleDarkMode() }
        });


        // --- Check API Key on load ---
        if (!apiKey) setTimeout(() => { showStatus('⚠️ กรุณาตั้งค่า API Key ก่อนใช้งาน'); toggleSettings() }, 500);
    </script>
</body>
