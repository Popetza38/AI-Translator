<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Voice Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
            overscroll-behavior-y: contain;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        .pulse-animation {
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-md z-10 shrink-0">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="globe" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold hidden sm:block">แปลภาษาสดเรียลไทม์</h1>
                <h1 class="text-xl font-bold sm:hidden">แปลสด</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="downloadBtn" disabled class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-700/50 text-blue-300 cursor-not-allowed transition">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span class="hidden md:inline">ส่งออก (TXT)</span>
                </button>
                <button id="clearBtn" class="hidden flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium bg-red-500 hover:bg-red-400 text-white transition">
                    ล้างทั้งหมด
                </button>
            </div>
        </div>
    </header>

    <!-- Error Alert -->
    <div id="errorAlert" class="hidden bg-red-50 border-b border-red-200 p-2 flex items-center justify-center gap-2 text-red-600 shrink-0">
        <i data-lucide="alert-circle" class="w-4 h-4"></i>
        <span id="errorMessage" class="text-sm font-medium"></span>
    </div>

    <!-- Main Container -->
    <main class="flex-1 overflow-hidden flex flex-col md:flex-row p-2 sm:p-4 gap-4 max-w-[1600px] w-full mx-auto">
        
        <!-- Source Column -->
        <section class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden min-h-0">
            <div class="bg-gray-50 p-3 border-b border-gray-200 flex items-center justify-between gap-2 shrink-0">
                <div class="flex items-center gap-2 flex-1">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-gray-400"></span>
                    <select id="sourceLangSelect" class="bg-white border border-gray-300 text-gray-700 rounded-lg py-1.5 px-3 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none w-full max-w-[180px]">
                        <!-- Options injected by JS -->
                    </select>
                </div>
                <button id="copySourceBtn" class="p-1.5 rounded-md flex items-center gap-1 text-xs font-medium text-gray-300 transition" title="คัดลอกต้นฉบับ">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">คัดลอก</span>
                </button>
            </div>

            <div id="sourceContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 bg-slate-50 custom-scrollbar">
                <div class="h-full flex items-center justify-center text-gray-400 text-center p-4 empty-state">
                    รอรับเสียงพูด...
                </div>
            </div>
        </section>

        <!-- Swap Button Desktop -->
        <div class="hidden md:flex flex-col justify-center shrink-0">
            <button id="swapBtn" class="p-3 bg-white border border-gray-300 rounded-full hover:bg-blue-50 hover:text-blue-600 transition shadow-sm hover:scale-110">
                <i data-lucide="arrow-right-left" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Translation Column -->
        <section class="flex-1 flex flex-col bg-blue-50/30 rounded-xl shadow-sm border border-blue-100 overflow-hidden min-h-0">
            <div class="bg-blue-50/80 p-3 border-b border-blue-100 flex items-center justify-between gap-2 shrink-0">
                <div class="flex items-center gap-2 flex-1">
                    <div id="translatingSpinner" class="hidden w-3 h-3 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <select id="targetLangSelect" class="bg-white border border-blue-200 text-blue-900 rounded-lg py-1.5 px-3 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none w-full max-w-[180px]">
                        <!-- Options injected by JS -->
                    </select>
                </div>
                <button id="copyTargetBtn" class="p-1.5 rounded-md flex items-center gap-1 text-xs font-medium text-blue-300 transition" title="คัดลอกคำแปล">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">คัดลอก</span>
                </button>
            </div>

            <div id="targetContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 bg-white custom-scrollbar">
                <div class="h-full flex items-center justify-center text-gray-400 text-center p-4 empty-state">
                    คำแปลจะปรากฏที่นี่
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Controls -->
    <footer class="p-4 bg-white border-t border-gray-200 shadow-[0_-4px_10px_rgba(0,0,0,0.02)] shrink-0 flex items-center justify-center relative">
        <button id="swapBtnMobile" class="md:hidden absolute left-4 p-2.5 bg-gray-100 border border-gray-300 rounded-full hover:bg-gray-200 transition text-gray-600">
            <i data-lucide="arrow-right-left" class="w-5 h-5"></i>
        </button>

        <button id="micBtn" class="relative flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 rounded-full text-white shadow-lg bg-blue-600 hover:bg-blue-700 transition-all transform hover:scale-105 active:scale-95">
            <div id="micRipple" class="hidden absolute w-full h-full rounded-full border-4 border-red-400 animate-ping opacity-75"></div>
            <i id="micIcon" data-lucide="mic-off" class="w-8 h-8 sm:w-10 sm:h-10 relative z-10"></i>
        </button>
    </footer>

    <script>
        // Configuration
        const languages = [
            { code: 'th-TH', translateCode: 'th', name: 'ไทย (Thai)' },
            { code: 'en-US', translateCode: 'en', name: 'อังกฤษ (English)' },
            { code: 'ja-JP', translateCode: 'ja', name: 'ญี่ปุ่น (Japanese)' },
            { code: 'ko-KR', translateCode: 'ko', name: 'เกาหลี (Korean)' },
            { code: 'zh-CN', translateCode: 'zh-CN', name: 'จีนตัวย่อ (Chinese)' },
            { code: 'es-ES', translateCode: 'es', name: 'สเปน (Spanish)' },
            { code: 'fr-FR', translateCode: 'fr', name: 'ฝรั่งเศส (French)' },
            { code: 'de-DE', translateCode: 'de', name: 'เยอรมัน (German)' },
        ];

        // State
        let isListening = false;
        let sourceLang = languages[0];
        let targetLang = languages[1];
        let sentences = [];
        let recognition = null;
        let translateTimeout = null;

        // Elements
        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        const micRipple = document.getElementById('micRipple');
        const statusDot = document.getElementById('statusDot');
        const sourceLangSelect = document.getElementById('sourceLangSelect');
        const targetLangSelect = document.getElementById('targetLangSelect');
        const sourceContainer = document.getElementById('sourceContainer');
        const targetContainer = document.getElementById('targetContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const translatingSpinner = document.getElementById('translatingSpinner');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');

        // Initialization
        function init() {
            // Populate selects
            languages.forEach(lang => {
                const srcOpt = new Option(lang.name, lang.code);
                const tgtOpt = new Option(lang.name, lang.code);
                sourceLangSelect.add(srcOpt);
                targetLangSelect.add(tgtOpt);
            });

            sourceLangSelect.value = sourceLang.code;
            targetLangSelect.value = targetLang.code;

            // Check Browser Support
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showError('เบราว์เซอร์ของคุณไม่รองรับการแปลงเสียง (แนะนำ Chrome)');
                micBtn.disabled = true;
                micBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }

            lucide.createIcons();
            attachEventListeners();
        }

        function attachEventListeners() {
            micBtn.addEventListener('click', toggleListening);
            sourceLangSelect.addEventListener('change', (e) => {
                sourceLang = languages.find(l => l.code === e.target.value);
                if (isListening) restartListening();
            });
            targetLangSelect.addEventListener('change', (e) => {
                targetLang = languages.find(l => l.code === e.target.value);
            });
            document.getElementById('swapBtn').addEventListener('click', swapLanguages);
            document.getElementById('swapBtnMobile').addEventListener('click', swapLanguages);
            clearBtn.addEventListener('click', clearAll);
            downloadBtn.addEventListener('click', downloadText);
            
            document.getElementById('copySourceBtn').addEventListener('click', () => copyToClipboard('source'));
            document.getElementById('copyTargetBtn').addEventListener('click', () => copyToClipboard('target'));
        }

        // Logic Functions
        async function translateText(text, sl, tl) {
            if (!text.trim()) return '';
            translatingSpinner.classList.remove('hidden');
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                const data = await response.json();
                return data[0].map(item => item[0]).join('');
            } catch (err) {
                console.error(err);
                return '...';
            } finally {
                translatingSpinner.classList.add('hidden');
            }
        }

        function toggleListening() {
            if (isListening) stopListening();
            else startListening();
        }

        function startListening() {
            hideError();
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = sourceLang.code;

            recognition.onstart = () => {
                isListening = true;
                updateMicUI();
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript.trim();
                    if (event.results[i].isFinal) {
                        if (transcript) processFinalSentence(transcript);
                    } else {
                        interimTranscript += transcript;
                    }
                }
                updateInterimUI(interimTranscript);
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') {
                    showError('กรุณาอนุญาตการเข้าถึงไมโครโฟน');
                }
                stopListening();
            };

            recognition.onend = () => {
                if (isListening) recognition.start();
            };

            recognition.start();
        }

        function stopListening() {
            isListening = false;
            if (recognition) recognition.stop();
            updateMicUI();
            updateInterimUI('');
        }

        function restartListening() {
            stopListening();
            setTimeout(startListening, 300);
        }

        async function processFinalSentence(text) {
            const id = Date.now().toString();
            const sentence = { id, source: text, translation: 'กำลังแปล...' };
            sentences.push(sentence);
            renderSentences();

            const translation = await translateText(text, sourceLang.translateCode, targetLang.translateCode);
            const index = sentences.findIndex(s => s.id === id);
            if (index !== -1) {
                sentences[index].translation = translation;
                renderSentences();
            }
        }

        function updateInterimUI(text) {
            // Remove existing interim elements
            const oldInterimSrc = document.getElementById('interim-src');
            const oldInterimTgt = document.getElementById('interim-tgt');
            if (oldInterimSrc) oldInterimSrc.remove();
            if (oldInterimTgt) oldInterimTgt.remove();

            if (!text) return;

            // Show interim in source
            const srcDiv = document.createElement('div');
            srcDiv.id = 'interim-src';
            srcDiv.className = 'bg-white/50 p-3 sm:p-4 rounded-lg border border-gray-200 border-dashed';
            srcDiv.innerHTML = `<p class="text-gray-400 italic text-base sm:text-lg leading-relaxed">${text} ...</p>`;
            sourceContainer.appendChild(srcDiv);
            sourceContainer.scrollTop = sourceContainer.scrollHeight;

            // Debounced translation for interim
            if (translateTimeout) clearTimeout(translateTimeout);
            translateTimeout = setTimeout(async () => {
                const trans = await translateText(text, sourceLang.translateCode, targetLang.translateCode);
                
                // Double check if interim still exists
                if (!document.getElementById('interim-src')) return;

                const tgtDiv = document.createElement('div');
                tgtDiv.id = 'interim-tgt';
                tgtDiv.className = 'bg-blue-50/30 p-3 sm:p-4 rounded-lg border border-blue-200 border-dashed';
                tgtDiv.innerHTML = `<p class="text-blue-400 italic font-medium text-lg sm:text-xl leading-relaxed">${trans} ...</p>`;
                
                const oldTgt = document.getElementById('interim-tgt');
                if (oldTgt) oldTgt.remove();
                
                targetContainer.appendChild(tgtDiv);
                targetContainer.scrollTop = targetContainer.scrollHeight;
            }, 600);
        }

        function renderSentences() {
            const hasData = sentences.length > 0;
            
            // Toggle visibility of clear/download
            clearBtn.classList.toggle('hidden', !hasData);
            downloadBtn.disabled = !hasData;
            downloadBtn.className = hasData 
                ? 'flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-500 hover:bg-blue-400 text-white transition'
                : 'flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-700/50 text-blue-300 cursor-not-allowed transition';

            // Update Copy Buttons color
            document.getElementById('copySourceBtn').classList.toggle('text-gray-500', hasData);
            document.getElementById('copySourceBtn').classList.toggle('text-gray-300', !hasData);
            document.getElementById('copyTargetBtn').classList.toggle('text-blue-600', hasData);
            document.getElementById('copyTargetBtn').classList.toggle('text-blue-300', !hasData);

            // Clean containers
            sourceContainer.innerHTML = '';
            targetContainer.innerHTML = '';

            if (!hasData) {
                sourceContainer.innerHTML = '<div class="h-full flex items-center justify-center text-gray-400 text-center p-4">รอรับเสียงพูด...</div>';
                targetContainer.innerHTML = '<div class="h-full flex items-center justify-center text-gray-400 text-center p-4">คำแปลจะปรากฏที่นี่</div>';
                return;
            }

            sentences.forEach(s => {
                // Source Card
                const sCard = document.createElement('div');
                sCard.className = 'bg-white p-3 sm:p-4 rounded-lg border border-gray-100 shadow-sm';
                sCard.innerHTML = `<p class="text-gray-800 text-base sm:text-lg leading-relaxed">${s.source}</p>`;
                sourceContainer.appendChild(sCard);

                // Target Card
                const tCard = document.createElement('div');
                tCard.className = 'bg-blue-50/50 p-3 sm:p-4 rounded-lg border border-blue-100 shadow-sm flex justify-between items-start gap-3 group hover:border-blue-300 transition-colors';
                
                const p = document.createElement('p');
                p.className = 'text-blue-900 font-medium text-lg sm:text-xl leading-relaxed flex-1';
                p.textContent = s.translation;
                
                const volBtn = document.createElement('button');
                volBtn.className = 'text-gray-400 hover:text-blue-600 transition p-1.5 rounded-full hover:bg-blue-100 md:opacity-0 md:group-hover:opacity-100 focus:opacity-100 shrink-0';
                volBtn.innerHTML = `<i data-lucide="volume-2" class="w-5 h-5"></i>`;
                volBtn.onclick = () => speak(s.translation);

                tCard.appendChild(p);
                tCard.appendChild(volBtn);
                targetContainer.appendChild(tCard);
            });

            lucide.createIcons();
            sourceContainer.scrollTop = sourceContainer.scrollHeight;
            targetContainer.scrollTop = targetContainer.scrollHeight;
        }

        function updateMicUI() {
            if (isListening) {
                micBtn.classList.replace('bg-blue-600', 'bg-red-500');
                micBtn.classList.add('pulse-animation');
                micRipple.classList.remove('hidden');
                micIcon.setAttribute('data-lucide', 'mic');
                statusDot.classList.replace('bg-gray-400', 'bg-red-500');
                statusDot.classList.add('animate-pulse');
            } else {
                micBtn.classList.replace('bg-red-500', 'bg-blue-600');
                micBtn.classList.remove('pulse-animation');
                micRipple.classList.add('hidden');
                micIcon.setAttribute('data-lucide', 'mic-off');
                statusDot.classList.replace('bg-red-500', 'bg-gray-400');
                statusDot.classList.remove('animate-pulse');
            }
            lucide.createIcons();
        }

        function swapLanguages() {
            const temp = sourceLang;
            sourceLang = targetLang;
            targetLang = temp;

            sourceLangSelect.value = sourceLang.code;
            targetLangSelect.value = targetLang.code;

            sentences = [];
            renderSentences();
            if (isListening) restartListening();
        }

        function speak(text) {
            if ('speechSynthesis' in window && text && text !== 'กำลังแปล...') {
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = targetLang.code;
                window.speechSynthesis.speak(ut);
            }
        }

        function clearAll() {
            if (confirm('คุณต้องการล้างข้อความทั้งหมดใช่หรือไม่?')) {
                sentences = [];
                renderSentences();
            }
        }

        function copyToClipboard(type) {
            if (sentences.length === 0) return;
            const text = sentences.map(s => type === 'source' ? s.source : s.translation).join('\n');
            
            // Simple visual feedback
            const btn = type === 'source' ? document.getElementById('copySourceBtn') : document.getElementById('copyTargetBtn');
            const originalHTML = btn.innerHTML;
            
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-green-500"></i><span class="hidden sm:inline">คัดลอกแล้ว</span>`;
                lucide.createIcons();
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    lucide.createIcons();
                }, 2000);
            });
        }

        function downloadText() {
            if (sentences.length === 0) return;
            const content = sentences.map(s => `[${sourceLang.name}]: ${s.source}\n[${targetLang.name}]: ${s.translation}\n`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `translation_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorAlert.classList.remove('hidden');
        }

        function hideError() {
            errorAlert.classList.add('hidden');
        }

        // Boot
        window.onload = init;
    </script>
</body>
</html>
